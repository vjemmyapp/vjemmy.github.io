<html>

<head>

<style>

body{

margin:0;
height:100vh;

.subtitle{

margin-bottom:25px;

input{

width:100%;

padding:15px;

margin:8px 0;

border-radius:12px;

border:1px solid #ccc;

button{

width:100%;

padding:15px;

margin-top:15px;

cursor:pointer;

<body>



<div class="container"><div class="logo">

</div>



<div class="subtitle">
Create your account and start watching
</div>



<!-- REGISTER -->

<div id="registerForm" class="form active">


<h2>Create Account</h2>


<input 
id="regName"
placeholder="Your Name"
>


<input 
id="regWhatsapp"
placeholder="WhatsApp Number (e.g +254700000000)"
>


<input 
id="regPassword"
type="password"
placeholder="Create Password"
>


<button onclick="registerUser()">
CREATE ACCOUNT
</button>


<div id="registerMessage"
class="message">
</div>


<div class="switch" onclick="showLogin()">

Already have account? Login

</div>


</div>





<!-- LOGIN -->


<div id="loginForm" class="form">


<h2>Login</h2>



<input
id="loginIdentity"
placeholder="Your Name"
>


<input
id="loginPassword"
type="password"
placeholder="Password"
>


<button onclick="loginUser()">

LOGIN

</button>



<div id="loginMessage"
class="message">

</div>



<div class="switch" onclick="showRegister()">

Create New Account

</div>



</div>



</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>

const supabaseClient =
supabase.createClient(
SUPABASE_URL,

// ================================
// SWITCH FORMS
// ================================


function showLogin(){

document
.getElementById("registerForm")
.classList.remove("active");


document
.getElementById("loginForm")
.classList.add("active");

}




function showRegister(){

document
.getElementById("loginForm")
.classList.remove("active");


document
.getElementById("registerForm")
.classList.add("active");

}





// ================================
// DEVICE ID
// ================================


function getDeviceID(){


let device =
localStorage.getItem("device_id");


if(!device){

device =
crypto.randomUUID();


localStorage.setItem(
"device_id",
device
);

}


return device;

}





// ================================
// PASSWORD HASH
// ================================


async function hashPassword(password){


const data =
new TextEncoder()
.encode(password);



const hash =
await crypto.subtle.digest(
"SHA-256",
data
);



return Array.from(
new Uint8Array(hash)
)
.map(
x=>x.toString(16)
.padStart(2,"0")
)
.join("");

}






// ================================
// REGISTER
// ================================


async function registerUser(){

  let name =
regName.value.trim();

let phone =
regWhatsapp.value.trim();

let password =
regPassword.value;

let msg =
registerMessage;

if(
    !name ||
    !phone ||
    !password
){

    msg.innerHTML =
    "Please complete all fields.";

    return;

}

    // Remove spaces, dashes and brackets
    phone = phone.replace(/[\s()-]/g, "");

    // Allow one leading +
    if (phone.startsWith("+")) {
        phone = "+" + phone.substring(1).replace(/\+/g, "");
    }

    // Validate phone number
    if (!/^\+?[1-9]\d{7,14}$/.test(phone)) {

        msg.innerHTML =
        "Please enter a valid WhatsApp number.";

        return;

    }

    // Continue with password hashing...
let passwordHash =
await hashPassword(password);




const {data,error}=

await supabaseClient

.from("profiles")

.insert({

    name: name,

    whatsapp_number: phone,

    password_hash: passwordHash,

    device_id: getDeviceID(),

    account_status: "active",

    paid_status: false

})

.select()

.single();




if(error){

msg.innerHTML=
error.message;

return;

}




msg.className=
"message success";


msg.innerHTML=
"Account created successfully";




localStorage.setItem(
"loggedIn",
"true"
);

localStorage.setItem(
"user_id",
data.id
);

localStorage.setItem(
"name",
data.name
);

localStorage.setItem(
"whatsapp_number",
data.whatsapp_number
);

localStorage.setItem(
"account_status",
data.account_status
);

localStorage.setItem(
"paid_status",
data.paid_status
);




setTimeout(()=>{

window.location.href="home.html";

},1500);



}






// ================================
// LOGIN
// ================================

async function loginUser(){

    let name =
    loginIdentity.value.trim();

    let password =
    loginPassword.value;

    let msg =
    loginMessage;

    if(
        !name ||
        !password
    ){

        msg.innerHTML =
        "Please enter your name and password.";

        return;

    }

    let passwordHash =
    await hashPassword(password);

    const { data, error } =

    await supabaseClient

    .from("profiles")

    .select("*")

    .eq("name", name)

    .eq("password_hash", passwordHash)

    .single();

    if(error || !data){

        msg.innerHTML =
        "Incorrect name or password.";

        return;

    }

   localStorage.setItem(
"loggedIn",
"true"
);

localStorage.setItem(
"user_id",
data.id
);

localStorage.setItem(
"name",
data.name
);

localStorage.setItem(
"whatsapp_number",
data.whatsapp_number
);

localStorage.setItem(
"account_status",
data.account_status
);

localStorage.setItem(
"paid_status",
data.paid_status
);
    window.location.href =
    "home.html";

}



</script>


</body>
